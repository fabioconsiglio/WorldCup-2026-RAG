name: "Daily ETL: World Cup Data Sync"

on:
  schedule:
    # Runs at 08:07 UTC every day (off-peak to avoid rate-limiting contention)
    - cron: "7 8 * * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen
      - name: Run ETL
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
        run: uv run fetch-wc --full